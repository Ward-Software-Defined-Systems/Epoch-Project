<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="The Epoch Project — four derivations compared: how each holds the boundary ψ">
<!-- ================= PALETTE — edit colours here =================
     ink #0E0F13 · band #13161C · subbox #0F1217
     bone #EFEAE0 · muted #8B909B · slate #6FA0B2 · slate-deep #46586A
     ember #E9883B · ember-soft #F4A862 · ember-deep #C96A28
     One axis of variation: how the boundary ψ is held —
     CHECK (discrete ψ? gate) · CONSERVE (SOL, E<0) ·
     PROJECT (QNM, P_ψ) · SELECT (MWA, decoherence/einselection).
     Fonts are generic families for reliable GitHub image rendering.
=============================================================== -->
<defs>
  <style>
    .serif{font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif;}
    .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
    .bone{fill:#EFEAE0;} .muted{fill:#8B909B;} .slate{fill:#6FA0B2;} .ember{fill:#E9883B;} .embersoft{fill:#F4A862;}
    .flow{stroke:#6FA0B2;stroke-width:2;fill:none;}
    .faint{stroke:#46586A;stroke-width:1.5;fill:none;}
    .orbit{stroke:#6FA0B2;stroke-width:1;fill:none;opacity:0.35;}
    .mline{stroke:#E9883B;stroke-opacity:0.55;stroke-width:1.6;fill:none;}
    .branch{stroke:#6FA0B2;fill:none;opacity:0.85;stroke-linecap:round;}
    .dash{stroke-dasharray:6 5;}
    .grid-h{stroke:#46586A;stroke-opacity:0.30;stroke-width:1;}
    .grid-v{stroke:#46586A;stroke-opacity:0.20;stroke-width:1;}
  </style>
  <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#101117"/><stop offset="100%" stop-color="#0A0B0E"/>
  </linearGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0 H0 V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
  </pattern>
  <filter id="emberGlow" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="ahS" markerWidth="9" markerHeight="8" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L6.5,3.5 L0,7 Z" fill="#6FA0B2"/>
  </marker>
  <marker id="ahF" markerWidth="8" markerHeight="7" refX="5.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L6,3 L0,6 Z" fill="#46586A"/>
  </marker>
  <marker id="ahE" markerWidth="8" markerHeight="7" refX="5.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L6,3 L0,6 Z" fill="#E9883B"/>
  </marker>
</defs>

<rect width="1600" height="1000" fill="url(#inkGrad)"/>
<rect width="1600" height="1000" fill="url(#grid)"/>

<!-- ===== title ===== -->
<text x="40" y="42" class="mono slate" font-size="13" letter-spacing="3">THE EPOCH PROJECT</text>
<text x="800" y="88" class="serif bone" font-size="34" text-anchor="middle">Four Derivations &#183; One Boundary</text>
<text x="800" y="118" class="mono muted" font-size="14" text-anchor="middle">The same Epoch Automaton&#160;&#160;E = (S, &#931;, &#948;, s&#8320;, F, &#968;)&#160;&#160;&#8212;&#160;&#160;Ark observes &#183; Memory records &#183; Steward queries.</text>
<text x="800" y="142" class="serif embersoft" font-size="15" font-style="italic" text-anchor="middle">They differ in exactly one thing: how the boundary &#968; is held.</text>
<line x1="40" y1="158" x2="1560" y2="158" class="grid-h" stroke-opacity="0.45"/>

<!-- ============================================================ -->
<!-- COLUMN HEADERS — glyph · name · verb · substrate              -->
<!-- centers: c1 405 · c2 735 · c3 1065 · c4 1395                  -->
<!-- ============================================================ -->

<!-- c1 DISCRETE — CHECK : a ψ? gate between two states -->
<line x1="360" y1="212" x2="452" y2="212" class="flow" marker-end="url(#ahS)"/>
<circle cx="350" cy="212" r="6.5" fill="#6FA0B2"/>
<circle cx="462" cy="212" r="6.5" fill="#6FA0B2"/>
<path d="M405,202 L415,212 L405,222 L395,212 Z" fill="#E9883B" stroke="#0E0F13" stroke-width="1"/>
<text x="405" y="240" class="mono ember" font-size="11" text-anchor="middle">&#968;?</text>
<text x="405" y="280" class="mono slate" font-size="13" letter-spacing="2" text-anchor="middle">DISCRETE</text>
<text x="405" y="314" class="serif ember" font-size="27" font-weight="700" text-anchor="middle">CHECK</text>
<text x="405" y="335" class="mono muted" font-size="11" text-anchor="middle">the core automaton</text>

<!-- c2 SOL — CONSERVE : an ember sun on a bound orbit (E<0) -->
<ellipse cx="735" cy="210" rx="46" ry="18" class="orbit"/>
<circle cx="770" cy="222" r="3" fill="#6FA0B2"/>
<circle cx="735" cy="210" r="8" fill="#F4A862" filter="url(#emberGlow)"/>
<text x="735" y="244" class="mono ember" font-size="11" text-anchor="middle">E &lt; 0</text>
<text x="735" y="280" class="mono slate" font-size="13" letter-spacing="2" text-anchor="middle">SOL</text>
<text x="735" y="314" class="serif ember" font-size="27" font-weight="700" text-anchor="middle">CONSERVE</text>
<text x="735" y="335" class="mono muted" font-size="11" text-anchor="middle">orbital phase space</text>

<!-- c3 QNM — PROJECT : gradient bent back onto a submanifold by P_ψ -->
<path d="M1012,222 Q1065,205 1118,213" class="mline"/>
<circle cx="1055" cy="211" r="5" fill="#6FA0B2"/>
<line x1="1057" y1="216" x2="1063" y2="248" class="faint dash" marker-end="url(#ahF)"/>
<path d="M1063,248 Q1080,232 1083,215" fill="none" stroke="#E9883B" stroke-width="1.6" marker-end="url(#ahE)"/>
<text x="1100" y="242" class="mono ember" font-size="11">P_&#968;</text>
<text x="1065" y="280" class="mono slate" font-size="13" letter-spacing="2" text-anchor="middle">QNM</text>
<text x="1065" y="314" class="serif ember" font-size="27" font-weight="700" text-anchor="middle">PROJECT</text>
<text x="1065" y="335" class="mono muted" font-size="11" text-anchor="middle">configuration manifold</text>

<!-- c4 MWA — SELECT : a branching fork, branch width ∝ Born weight -->
<line x1="1346" y1="212" x2="1452" y2="188" class="branch" stroke-width="5"/>
<line x1="1346" y1="212" x2="1452" y2="212" class="branch" stroke-width="3"/>
<line x1="1346" y1="212" x2="1452" y2="236" class="branch" stroke-width="1.5"/>
<circle cx="1452" cy="188" r="3" fill="#6FA0B2"/>
<circle cx="1452" cy="212" r="3" fill="#6FA0B2"/>
<circle cx="1452" cy="236" r="3" fill="#6FA0B2"/>
<circle cx="1338" cy="212" r="6" fill="#F4A862" filter="url(#emberGlow)"/>
<text x="1393" y="256" class="mono ember" font-size="11" text-anchor="middle">|c_k|&#178;</text>
<text x="1395" y="280" class="mono slate" font-size="13" letter-spacing="2" text-anchor="middle">MWA</text>
<text x="1395" y="314" class="serif ember" font-size="27" font-weight="700" text-anchor="middle">SELECT</text>
<text x="1395" y="335" class="mono muted" font-size="11" text-anchor="middle">Hilbert space</text>

<!-- ============================================================ -->
<!-- GRID                                                          -->
<!-- ============================================================ -->
<!-- ψ-held-by row highlight band (the thesis row) -->
<rect x="40" y="430" width="1520" height="90" fill="#E9883B" opacity="0.055"/>

<line x1="40" y1="360" x2="1560" y2="360" class="grid-h" stroke-opacity="0.5"/>
<line x1="40" y1="430" x2="1560" y2="430" class="grid-h"/>
<line x1="40" y1="520" x2="1560" y2="520" class="grid-h"/>
<line x1="40" y1="590" x2="1560" y2="590" class="grid-h"/>
<line x1="40" y1="652" x2="1560" y2="652" class="grid-h"/>
<line x1="40" y1="722" x2="1560" y2="722" class="grid-h"/>
<line x1="40" y1="796" x2="1560" y2="796" class="grid-h"/>
<line x1="40" y1="870" x2="1560" y2="870" class="grid-h"/>

<line x1="240" y1="360" x2="240" y2="928" class="grid-v" stroke-opacity="0.32"/>
<line x1="570" y1="360" x2="570" y2="928" class="grid-v"/>
<line x1="900" y1="360" x2="900" y2="928" class="grid-v"/>
<line x1="1230" y1="360" x2="1230" y2="928" class="grid-v"/>

<!-- ===== row labels (right-aligned at x=224) ===== -->
<text x="224" y="399" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">6-TUPLE</text>
<text x="224" y="479" class="mono ember" font-size="12" text-anchor="end" letter-spacing="1">&#968; HELD BY</text>
<text x="224" y="559" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">FLOW&#160;&#160;&#948;</text>
<text x="224" y="625" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">TRAJECTORY</text>
<text x="224" y="691" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">ENDS &#183; &#968;=false</text>
<text x="224" y="759" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">ARK</text>
<text x="224" y="833" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">STEWARD</text>
<text x="224" y="899" class="mono slate" font-size="12" text-anchor="end" letter-spacing="1">PRECEDENT</text>

<!-- ============================================================ -->
<!-- ROW 1 — 6-TUPLE -->
<text x="405"  y="400" class="mono bone" font-size="14" text-anchor="middle">E = (S, &#931;, &#948;, s&#8320;, F, &#968;)</text>
<text x="735"  y="400" class="mono bone" font-size="14" text-anchor="middle">(&#915;, H, &#934;_H, &#947;&#8320;, F_&#915;, &#968;)</text>
<text x="1065" y="400" class="mono bone" font-size="14" text-anchor="middle">(M, H, &#8711;, m&#8320;, F_M, &#968;)</text>
<text x="1395" y="400" class="mono bone" font-size="14" text-anchor="middle">(&#8459;, &#292;, U, &#936;&#8320;, F_&#8459;, &#968;)</text>

<!-- ROW 2 — ψ HELD BY (headline) -->
<text x="405"  y="467" class="mono ember" font-size="14" font-weight="700" text-anchor="middle">a check</text>
<text x="405"  y="490" class="mono muted" font-size="12" text-anchor="middle">&#963;_verify at each crossing</text>
<text x="735"  y="467" class="mono ember" font-size="14" font-weight="700" text-anchor="middle">a conservation law</text>
<text x="735"  y="490" class="mono muted" font-size="12" text-anchor="middle">E&lt;0 &#183; &#915;_&#968; flow-invariant</text>
<text x="1065" y="467" class="mono ember" font-size="14" font-weight="700" text-anchor="middle">a projection</text>
<text x="1065" y="490" class="mono muted" font-size="12" text-anchor="middle">P_&#968; &#183; built into geometry</text>
<text x="1395" y="467" class="mono ember" font-size="14" font-weight="700" text-anchor="middle">the environment</text>
<text x="1395" y="490" class="mono muted" font-size="12" text-anchor="middle">decoherence &#183; einselection</text>

<!-- ROW 3 — FLOW δ -->
<text x="405"  y="551" class="mono bone" font-size="13" text-anchor="middle">&#948;: S&#215;&#931; &#8594; S</text>
<text x="405"  y="571" class="mono muted" font-size="11" text-anchor="middle">discrete steps</text>
<text x="735"  y="551" class="mono bone" font-size="13" text-anchor="middle">&#934;_H &#183; Hamiltonian</text>
<text x="735"  y="571" class="mono muted" font-size="11" text-anchor="middle">symplectic &#183; real</text>
<text x="1065" y="551" class="mono bone" font-size="13" text-anchor="middle">&#8711; = P_&#968; &#8728; &#8711;</text>
<text x="1065" y="571" class="mono muted" font-size="11" text-anchor="middle">gradient &#183; real</text>
<text x="1395" y="551" class="mono bone" font-size="13" text-anchor="middle">U = e^(&#8722;i&#292;t/&#295;)</text>
<text x="1395" y="571" class="mono muted" font-size="11" text-anchor="middle">unitary &#183; complex</text>

<!-- ROW 4 — TRAJECTORY -->
<text x="405"  y="625" class="mono bone" font-size="13" text-anchor="middle">single path</text>
<text x="735"  y="625" class="mono bone" font-size="13" text-anchor="middle">single &#183; confined</text>
<text x="1065" y="625" class="mono bone" font-size="13" text-anchor="middle">single &#183; confined</text>
<text x="1395" y="625" class="mono ember" font-size="13" font-weight="700" text-anchor="middle">branches &#8212; a tree</text>

<!-- ROW 5 — ENDS (ψ=false) -->
<text x="405"  y="691" class="mono bone" font-size="13" text-anchor="middle">a check fails &#8594; halt</text>
<text x="735"  y="691" class="mono bone" font-size="13" text-anchor="middle">unbinding (E&#8805;0) &#8212; ejection</text>
<text x="1065" y="691" class="mono bone" font-size="13" text-anchor="middle">off-submanifold</text>
<text x="1395" y="691" class="mono bone" font-size="13" text-anchor="middle">recoherence (rare)</text>

<!-- ROW 6 — ARK -->
<text x="405"  y="755" class="mono bone" font-size="13" text-anchor="middle">meta-automaton</text>
<text x="405"  y="775" class="mono muted" font-size="11" text-anchor="middle">observes &#183; verifies</text>
<text x="735"  y="755" class="mono bone" font-size="13" text-anchor="middle">Sagittarius A*</text>
<text x="735"  y="775" class="mono muted" font-size="11" font-style="italic" text-anchor="middle">correspondence (no verify)</text>
<text x="1065" y="755" class="mono bone" font-size="13" text-anchor="middle">the substrate</text>
<text x="1065" y="775" class="mono muted" font-size="11" text-anchor="middle">defines P_&#968;</text>
<text x="1395" y="755" class="mono bone" font-size="13" text-anchor="middle">&#936; + Schr&#246;dinger</text>
<text x="1395" y="775" class="mono muted" font-size="11" font-style="italic" text-anchor="middle">correspondence &#183; never rejects</text>

<!-- ROW 7 — STEWARD -->
<text x="405"  y="829" class="mono bone" font-size="13" text-anchor="middle">external oracle</text>
<text x="405"  y="849" class="mono muted" font-size="11" text-anchor="middle">&#8713; S</text>
<text x="735"  y="829" class="mono bone" font-size="13" text-anchor="middle">observer / IAU</text>
<text x="735"  y="849" class="mono muted" font-size="11" text-anchor="middle">&#8713; &#915;</text>
<text x="1065" y="829" class="mono bone" font-size="13" text-anchor="middle">external oracle</text>
<text x="1065" y="849" class="mono muted" font-size="11" text-anchor="middle">&#8713; M</text>
<text x="1395" y="829" class="mono ember" font-size="13" text-anchor="middle">in-branch &#8212; strained</text>
<text x="1395" y="849" class="mono muted" font-size="11" font-style="italic" text-anchor="middle">&#8713; &#8459; &#183; branches too</text>

<!-- FOOTER — PRECEDENT -->
<text x="405"  y="901" class="mono muted" font-size="11" text-anchor="middle">the core formalism</text>
<text x="735"  y="901" class="mono muted" font-size="11" text-anchor="middle">KAM &#183; Laskar&#8211;Gastineau 2009</text>
<text x="1065" y="901" class="mono muted" font-size="11" text-anchor="middle">USTC reservoir &#183; PRL 136, 120602</text>
<text x="1395" y="901" class="mono muted" font-size="11" text-anchor="middle">Everett 1957 &#183; Zurek 2003</text>

<!-- ===== capstone progression ===== -->
<text x="800" y="965" class="serif ember" font-size="18" font-weight="700" text-anchor="middle">CHECK&#160;&#160;&#8594;&#160;&#160;CONSERVE&#160;&#160;&#8594;&#160;&#160;PROJECT&#160;&#160;&#8594;&#160;&#160;SELECT</text>
<text x="800" y="986" class="mono muted" font-size="11.5" font-style="italic" text-anchor="middle">one boundary &#968;, held four ways &#8212; only Many-Worlds branches, and only there does the external Ark / Steward strain.</text>
</svg>
