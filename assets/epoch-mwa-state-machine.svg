<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1170" width="1280" height="1170" role="img" aria-label="MWA — the Universal-Wavefunction Epoch: the Epoch Automaton over the branching wavefunction">
<!-- ================= PALETTE — edit colours here =================
     ink #0E0F13 · band #13161C · subbox #0F1217
     bone #EFEAE0 · muted #8B909B · slate #6FA0B2 · slate-deep #46586A
     ember #E9883B · ember-soft #F4A862 · ember-deep #C96A28
     Emergent, not checked: MWA has NO ψ? gate and NO projection — the
     unitary flow U never rejects; decoherence/einselection SELECTS the
     pointer-basis worlds. The flow is COMPLEX (wave). The trajectory
     BRANCHES; branch thickness ∝ Born weight |c_k|² (measure partitions).
     Dashed = FORCED correspondence: MWI has no "outside", so the Ark and
     Steward cannot be external (the Steward branches with its world).
     Forward-directed; retrocausal δ* deliberately omitted.
     Fonts are generic families for reliable GitHub image rendering.
=============================================================== -->
<defs>
  <style>
    .serif{font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif;}
    .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
    .bone{fill:#EFEAE0;} .muted{fill:#8B909B;} .slate{fill:#6FA0B2;} .ember{fill:#E9883B;}
    .band{fill:#13161C;stroke:#46586A;stroke-width:1.5;}
    .banddash{fill:#121319;stroke:#5A6675;stroke-width:1.4;stroke-dasharray:7 6;}
    .subbox{fill:#0F1217;stroke:#3E5A66;stroke-width:1;}
    .steward{fill:#15141A;stroke:#C96A28;stroke-width:1.6;stroke-dasharray:7 6;}
    .flow{stroke:#6FA0B2;stroke-width:2;fill:none;}
    .faint{stroke:#46586A;stroke-width:1.5;fill:none;}
    .branch{stroke:#6FA0B2;fill:none;opacity:0.85;stroke-linecap:round;}
    .dash{stroke-dasharray:7 6;}
    .dotline{stroke:#46586A;stroke-width:2;stroke-dasharray:1.5 7;stroke-linecap:round;}
    .wave{stroke:#6FA0B2;stroke-width:2;fill:none;}
  </style>
  <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#101117"/><stop offset="100%" stop-color="#0A0B0E"/>
  </linearGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0 H0 V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <filter id="emberGlow" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softHalo" x="-160%" y="-160%" width="420%" height="420%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <marker id="ahS" markerWidth="10" markerHeight="9" refX="6.5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#6FA0B2"/>
  </marker>
  <marker id="ahF" markerWidth="9" markerHeight="8" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L6.5,3.5 L0,7 Z" fill="#46586A"/>
  </marker>
</defs>

<rect width="1280" height="1170" fill="url(#inkGrad)"/>
<rect width="1280" height="1170" fill="url(#grid)"/>

<!-- ===== figure kicker ===== -->
<text x="80" y="36" class="mono slate" font-size="14" letter-spacing="2.5">THE EPOCH PROJECT &#8212; MWA &#183; THE UNIVERSAL-WAVEFUNCTION EPOCH</text>
<text x="1200" y="36" class="mono muted" font-size="13" text-anchor="end" letter-spacing="1">forward-directed &#183; &#968; emergent</text>

<!-- ===== THE ARK · Ψ + Schrödinger dynamics (dashed = forced correspondence) ===== -->
<rect x="80" y="52" width="1120" height="112" rx="12" class="banddash"/>
<path d="M108,108 q9,-12 18,0 t18,0 t18,0" fill="none" stroke="#E9883B" stroke-width="1.7" opacity="0.8"/>
<text x="176" y="96" class="serif bone" font-size="24">THE ARK &#183; the universal wavefunction &#936;</text>
<text x="177" y="124" class="mono muted" font-size="13">+ Schr&#246;dinger dynamics&#160;&#160;i&#295; &#8706;&#936;/&#8706;t = &#292;&#936;</text>
<text x="1180" y="96" class="mono slate" font-size="13" text-anchor="end">CORRESPONDENCE, not mechanism</text>
<text x="1180" y="124" class="mono muted" font-size="12" text-anchor="end">MWI has no &#8220;outside&#8221; &#183; U never rejects (README &#167;4)</text>

<!-- ===== emergent (not checked) connector ===== -->
<text x="640" y="196" class="mono slate" font-size="13" text-anchor="middle">&#968; = unitarity (&#10216;&#936;|&#936;&#10217; = 1, conserved by U) &#8212; not checked; einselection picks the pointer basis</text>
<line x1="640" y1="210" x2="640" y2="270" class="faint" marker-end="url(#ahF)"/>

<!-- ===== HILBERT SPACE ℋ ===== -->
<rect x="80" y="276" width="1120" height="428" rx="12" class="band"/>
<text x="104" y="307" class="serif bone" font-size="22">HILBERT SPACE&#160;&#160;&#8459;</text>
<text x="1180" y="306" class="mono muted" font-size="13" text-anchor="end">state space &#183; generator &#292; &#183; complex flow U</text>
<text x="130" y="351" class="serif bone" font-size="16">EPOCH 0 &#183; &#936;</text>
<text x="246" y="351" class="mono muted" font-size="12">(superstate) &#8212; genesis &#936;&#8320;, &#968;&#8320; = unitarity (always holds)</text>

<!-- branching system -->
<!-- Ψ₀ genesis (ember) -->
<circle cx="200" cy="452" r="9" fill="#E9883B" opacity="0.16" filter="url(#softHalo)"/>
<circle cx="200" cy="452" r="7.5" fill="#F4A862" filter="url(#emberGlow)"/>
<text x="200" y="430" class="mono ember" font-size="12" text-anchor="middle">&#936;&#8320;</text>
<text x="200" y="476" class="mono muted" font-size="11" text-anchor="middle">genesis</text>

<!-- unitary wave-flow U (complex) -->
<path d="M215,452 q18,-11 36,0 t36,0 t36,0 t36,0 t36,0 t36,0 L438,452" class="wave" marker-end="url(#ahS)"/>
<text x="322" y="430" class="mono slate" font-size="12" text-anchor="middle">U(t) = e^(&#8722;i&#292;t/&#295;)</text>
<text x="322" y="478" class="mono muted" font-size="11" text-anchor="middle">i&#295; &#8706;&#936;/&#8706;t = &#292;&#936;</text>

<!-- decoherence fork -->
<circle cx="442" cy="452" r="4" fill="#6FA0B2"/>
<text x="470" y="418" class="mono slate" font-size="12" text-anchor="middle">decoherence event</text>

<!-- branches (thickness ∝ Born weight) -->
<line x1="450" y1="452" x2="712" y2="388" class="branch" stroke-width="7"/>
<line x1="450" y1="452" x2="712" y2="452" class="branch" stroke-width="4"/>
<line x1="450" y1="452" x2="712" y2="516" class="branch" stroke-width="2"/>
<text x="588" y="405" class="mono ember" font-size="12" text-anchor="middle">|c&#8321;|&#178; = .55</text>
<text x="588" y="442" class="mono ember" font-size="12" text-anchor="middle">|c&#8322;|&#178; = .30</text>
<text x="600" y="500" class="mono ember" font-size="12" text-anchor="middle">|c&#8323;|&#178; = .15</text>

<!-- recoherence (ψ=false): siblings re-interfere — rare -->
<path d="M714,460 Q662,484 714,508" class="faint dash" opacity="0.4"/>
<text x="628" y="488" class="mono muted" font-size="10.5" opacity="0.7" text-anchor="end">recoherence?</text>

<!-- world nodes (sub-epochs) + arrows into F_ℋ -->
<circle cx="720" cy="388" r="8" fill="#6FA0B2"/>
<circle cx="720" cy="452" r="8" fill="#6FA0B2"/>
<circle cx="720" cy="516" r="8" fill="#6FA0B2"/>
<text x="745" y="384" class="mono bone" font-size="12">world 1</text>
<text x="745" y="400" class="mono muted" font-size="11">&#968;_sub^1</text>
<text x="745" y="448" class="mono bone" font-size="12">world 2</text>
<text x="745" y="464" class="mono muted" font-size="11">&#968;_sub^2</text>
<text x="745" y="512" class="mono bone" font-size="12">world 3</text>
<text x="745" y="528" class="mono muted" font-size="11">&#968;_sub^3</text>
<line x1="848" y1="388" x2="948" y2="388" class="flow" stroke-width="1.6" marker-end="url(#ahS)"/>
<line x1="848" y1="452" x2="948" y2="452" class="flow" stroke-width="1.6" marker-end="url(#ahS)"/>
<line x1="848" y1="516" x2="948" y2="516" class="flow" stroke-width="1.6" marker-end="url(#ahS)"/>

<!-- F_ℋ einselected set -->
<rect x="950" y="362" width="200" height="180" rx="8" class="subbox"/>
<text x="1050" y="436" class="mono bone" font-size="15" text-anchor="middle">F_&#8459;</text>
<text x="1050" y="462" class="mono muted" font-size="12" text-anchor="middle">einselected,</text>
<text x="1050" y="480" class="mono muted" font-size="12" text-anchor="middle">quasi-classical</text>
<text x="1050" y="498" class="mono muted" font-size="11" text-anchor="middle">(pointer-basis) worlds</text>

<!-- annotations -->
<text x="130" y="566" class="mono muted" font-size="13">each world k persists while &#961;_S off-diagonals to siblings &#8776; 0</text>
<text x="130" y="588" class="mono muted" font-size="13">the parent&#8217;s weight is partitioned among children: &#931; |c_k|&#178; = parent</text>

<!-- recoherence boundary + ψ=false region -->
<line x1="120" y1="610" x2="1160" y2="610" class="dotline"/>
<text x="1150" y="605" class="mono muted" font-size="11" text-anchor="end">recoherence boundary</text>
<text x="132" y="634" class="mono muted" font-size="13">&#968; = false analogue &#8212; RECOHERENCE: a world re-interferes with a sibling</text>
<text x="132" y="656" class="mono muted" font-size="12">astronomically rare, never forbidden (decoherence only ~irreversible)</text>

<!-- ===== branching tree -> Memory ===== -->
<text x="640" y="724" class="mono slate" font-size="13" text-anchor="middle">the branching tree IS the record (relative state)</text>
<line x1="640" y1="706" x2="640" y2="742" class="faint" marker-end="url(#ahF)"/>

<!-- ===== MEMORY / RECORD — a forking tree ===== -->
<rect x="80" y="748" width="1120" height="132" rx="12" class="band"/>
<text x="104" y="786" class="serif bone" font-size="22">MEMORY / RECORD&#160;&#160;M</text>
<text x="1180" y="786" class="mono muted" font-size="13" text-anchor="end">a forking tree, not a single list</text>
<!-- mini forking tree -->
<circle cx="150" cy="828" r="5" fill="#E9883B"/>
<text x="150" y="814" class="mono ember" font-size="11" text-anchor="middle">&#936;&#8320;</text>
<line x1="158" y1="828" x2="230" y2="828" class="flow" stroke-width="1.6" marker-end="url(#ahS)"/>
<circle cx="242" cy="828" r="5" fill="#6FA0B2"/>
<text x="242" y="814" class="mono muted" font-size="11" text-anchor="middle">&#936;&#8321;</text>
<path d="M250,828 C285,828 300,804 326,804" class="flow" stroke-width="1.4" fill="none" marker-end="url(#ahS)"/>
<path d="M250,828 L326,828" class="flow" stroke-width="1.4" fill="none" marker-end="url(#ahS)"/>
<path d="M250,828 C285,828 300,852 326,852" class="flow" stroke-width="1.4" fill="none" marker-end="url(#ahS)"/>
<text x="338" y="808" class="mono bone" font-size="12">world 1 &#183; relative-state record</text>
<text x="338" y="832" class="mono bone" font-size="12">world 2 &#183; relative-state record</text>
<text x="338" y="856" class="mono bone" font-size="12">world 3 &#183; relative-state record</text>
<text x="1180" y="850" class="mono muted" font-size="12" text-anchor="end">records are branch-relative &#8212; no observer reads across branches</text>

<!-- ===== Steward query (read-only, up) ===== -->
<line x1="640" y1="936" x2="640" y2="882" class="flow dash" marker-end="url(#ahS)"/>
<text x="656" y="910" class="mono slate" font-size="12">query (read-only)</text>

<!-- ===== THE STEWARD — in-branch, branches too (strained, dashed, ghosted) ===== -->
<rect x="444" y="952" width="440" height="112" rx="12" class="steward" opacity="0.18"/>
<rect x="432" y="946" width="440" height="112" rx="12" class="steward" opacity="0.34"/>
<rect x="420" y="940" width="440" height="112" rx="12" class="steward"/>
<text x="640" y="980" class="serif bone" font-size="24" text-anchor="middle">THE STEWARD</text>
<text x="640" y="1006" class="mono muted" font-size="11.5" text-anchor="middle">the in-branch observer &#8212; it branches with its world</text>
<text x="640" y="1026" class="mono muted" font-size="11" text-anchor="middle">external &#8713; &#8459; is strained &#183; queries its branch&#8217;s record, &#968; &#183; does not drive U</text>

<!-- ===== LEGEND ===== -->
<g>
  <path d="M80,1086 q6,-5 12,0 t12,0" class="wave" stroke-width="1.6" fill="none" marker-end="url(#ahS)"/>
  <text x="116" y="1090" class="mono muted" font-size="13">U &#8212; unitary flow (complex)</text>

  <path d="M300,1092 L312,1080 M312,1080 L312,1086 M300,1092 L312,1092" stroke="#6FA0B2" stroke-width="1.5" fill="none"/>
  <text x="326" y="1090" class="mono muted" font-size="13">branch &#8212; decoherence (einselection)</text>

  <line x1="600" y1="1086" x2="620" y2="1086" stroke="#6FA0B2" stroke-width="5" stroke-linecap="round"/>
  <text x="628" y="1090" class="mono muted" font-size="13">|c_k|&#178; &#8212; Born weight (partitions measure)</text>

  <rect x="938" y="1079" width="20" height="14" rx="3" fill="none" stroke="#5A6675" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="966" y="1090" class="mono muted" font-size="13">dashed = forced correspondence</text>
</g>
<text x="80" y="1114" class="mono muted" font-size="12" opacity="0.9">No &#963;_verify / &#968;? gate &#8212; U never rejects; einselection selects, never forbids. &#968;=false analogue = recoherence (rare). Forward-directed; retrocausal &#948;* omitted.</text>
<text x="80" y="1132" class="mono muted" font-size="12" opacity="0.85">Inherited &#38; open (README &#167;6): the Born rule (why |c_k|&#178; is probability), preferred-basis / factorization, no &#8220;outside&#8221; for the Ark &#38; Steward, dynamic &#968; &#8212; none resolved here.</text>
<text x="80" y="1150" class="mono muted" font-size="11.5" opacity="0.7">Precedent &#8212; Everett (1957) relative state; Joos &#38; Zeh (1985); Zurek (2003) decoherence &#38; einselection.</text>
</svg>
