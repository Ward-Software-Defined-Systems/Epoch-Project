<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1100" width="1280" height="1100" role="img" aria-label="DEEPSEEK — the Operational Epoch: the Epoch Automaton over the discrete space of DeepSeek-V4-Pro checkpoints. THE ARK seals psi as a checkpoint hash plus an eval battery and runs sigma_verify at every transformation — the only derivation that KEEPS the verification gate. Discrete checkpoints s0 (the sealed open-weights baseline) advance to s1, s2 under transformation events sigma (quantize, fine-tune, distill); psi = psi_int (hash) AND psi_beh (eval battery within threshold tau) AND optionally psi_surf (activation constraint surface, the QNM bridge). MoE experts appear as illustrative substates only. When a transformation crosses tau, psi = false and the Ark refuses it: a real, computed boundary — same lineage, new epoch. MEMORY is the append-only transformation lineage with identity proofs; THE STEWARD is a literal read-only auditor outside S that replays the lineage and re-verifies psi but never drives delta.">
<!-- ================= PALETTE — edit colours here =================
     ink #0E0F13 · band #13161C · subbox #0F1217
     bone #EFEAE0 · muted #8B909B · slate #6FA0B2 · slate-deep #46586A
     ember #E9883B · ember-soft #F4A862 · ember-deep #C96A28
     DEEPSEEK is the only derivation that KEEPS the verification gate:
     QNM replaces it with a projection P_psi, SOL with a conservation
     law (E<0), MWA with einselection — DEEPSEEK CHECKS psi (sigma_verify).
     Solid border = LITERAL mechanism (Ark · Memory · Steward), the
     inverse of SOL/MWA where they are fenced correspondences.
     Dashed border = speculative / illustrative (psi_surf · MoE).
     Forward-directed; the retrocausal delta* is deliberately omitted
     (README §4). Fonts are generic families for reliable GitHub rendering.
=============================================================== -->
<defs>
  <style>
    .serif{font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif;}
    .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
    .bone{fill:#EFEAE0;} .muted{fill:#8B909B;} .slate{fill:#6FA0B2;}
    .ember{fill:#E9883B;} .embersoft{fill:#F4A862;}
  </style>
  <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#101117"/><stop offset="100%" stop-color="#0A0B0E"/>
  </linearGradient>
  <radialGradient id="emberGlow" cx="32%" cy="34%" r="85%">
    <stop offset="0%" stop-color="#E9883B" stop-opacity="0.24"/>
    <stop offset="55%" stop-color="#C96A28" stop-opacity="0.11"/>
    <stop offset="100%" stop-color="#0F1217" stop-opacity="0.96"/>
  </radialGradient>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L7,3 L0,6 Z" fill="#6FA0B2"/>
  </marker>
  <marker id="emberarrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L7,3 L0,6 Z" fill="#E9883B"/>
  </marker>
</defs>

<!-- background -->
<rect x="0" y="0" width="1280" height="1100" fill="url(#inkGrad)"/>
<rect x="16" y="16" width="1248" height="1068" rx="16" fill="none" stroke="#46586A" stroke-opacity="0.22" stroke-width="1"/>

<!-- ================= TITLE ================= -->
<text x="64" y="64" class="serif bone" font-size="30">DEEPSEEK &#8212; the Operational Epoch</text>
<line x1="64" y1="80" x2="186" y2="80" stroke="#E9883B" stroke-width="3"/>
<text x="64" y="101" class="mono muted" font-size="13.5">Epoch Automaton over the discrete space of model checkpoints &#183; DeepSeek-V4-Pro (open weights)</text>
<text x="64" y="123" class="mono ember" font-size="12.5">the only derivation that KEEPS the verification gate &#8212; SOL conserves &#183; QNM projects &#183; MWA selects &#183; DEEPSEEK checks</text>

<!-- ================= THE ARK ================= -->
<rect x="64" y="150" width="1152" height="96" rx="12" fill="#13161C" stroke="#46586A" stroke-width="1.5"/>
<text x="92" y="186" class="serif bone" font-size="19">THE ARK</text>
<text x="182" y="186" class="mono muted" font-size="13">&#8212; definer / verifier</text>
<text x="92" y="210" class="mono muted" font-size="13">seals &#968; (checkpoint hash + eval battery) &#183; runs &#963;_verify at every transformation</text>
<text x="92" y="232" class="mono ember" font-size="12.5">LITERAL &#8212; not a fenced correspondence (the inverse of SOL / MWA)</text>
<circle cx="1172" cy="198" r="18" fill="none" stroke="#E9883B" stroke-width="1.6"/>
<text x="1172" y="205" text-anchor="middle" class="ember" font-size="19" font-family="DejaVu Sans, sans-serif">&#10003;</text>

<!-- Ark -> gate elbow connector, carrying sigma_verify -->
<path d="M640,246 L640,272 L470,272 L470,298" fill="none" stroke="#6FA0B2" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="556" y="266" text-anchor="middle" class="mono slate" font-size="12.5">&#963;_verify:&#160; &#968; = &#968;_int &#8743; &#968;_beh ( &#8743; &#968;_surf )</text>

<!-- ================= STATE SPINE ================= -->
<!-- EPOCH 0 (ember genesis) -->
<rect x="64" y="312" width="200" height="92" rx="12" fill="url(#emberGlow)" stroke="#E9883B" stroke-width="1.75"/>
<text x="84" y="343" class="serif bone" font-size="16">EPOCH 0</text>
<text x="84" y="367" class="mono embersoft" font-size="12.5">s&#8320; &#8212; sealed V4-Pro ckpt</text>
<text x="84" y="389" class="mono muted" font-size="11.5">&#968;(s&#8320;) = true</text>

<!-- s0 -> gate -->
<line x1="264" y1="356" x2="408" y2="356" stroke="#6FA0B2" stroke-width="1.75" marker-end="url(#arrow)"/>
<text x="336" y="346" text-anchor="middle" class="mono muted" font-size="11.5">&#963;&#8321;: quantize</text>

<!-- THE GATE (hero) -->
<polygon points="470,300 528,356 470,412 412,356" fill="#0F1217" stroke="#E9883B" stroke-width="2.5"/>
<text x="470" y="352" text-anchor="middle" class="serif ember" font-size="27" font-weight="bold">&#968;?</text>
<text x="470" y="374" text-anchor="middle" class="muted" font-size="10.5" font-family="DejaVu Sans, sans-serif">verify</text>

<!-- gate TRUE -> EPOCH 1 -->
<line x1="528" y1="356" x2="632" y2="356" stroke="#6FA0B2" stroke-width="1.75" marker-end="url(#arrow)"/>
<text x="582" y="346" text-anchor="middle" class="slate" font-size="11.5" font-family="DejaVu Sans, sans-serif">&#968; = true &#10003;</text>
<text x="582" y="374" text-anchor="middle" class="mono muted" font-size="10.5">epoch persists</text>

<rect x="636" y="312" width="200" height="92" rx="12" fill="#13161C" stroke="#46586A" stroke-width="1.5"/>
<text x="656" y="343" class="serif bone" font-size="16">EPOCH 1</text>
<text x="656" y="367" class="mono bone" font-size="12.5">s&#8321; &#8212; quantized</text>
<text x="656" y="389" class="mono muted" font-size="11.5">&#968;(s&#8321;) = true</text>

<!-- EPOCH 1 -> EPOCH 2 with a mini gate (checked again) -->
<line x1="836" y1="356" x2="948" y2="356" stroke="#6FA0B2" stroke-width="1.75" marker-end="url(#arrow)"/>
<polygon points="892,343 905,356 892,369 879,356" fill="#0F1217" stroke="#E9883B" stroke-width="1.5"/>
<text x="892" y="360" text-anchor="middle" class="ember" font-size="10.5" font-family="DejaVu Sans, sans-serif">&#968;?</text>
<text x="892" y="334" text-anchor="middle" class="mono muted" font-size="11.5">&#963;&#8322;: fine-tune</text>

<rect x="952" y="312" width="200" height="92" rx="12" fill="#13161C" stroke="#46586A" stroke-width="1.5"/>
<text x="972" y="343" class="serif bone" font-size="16">EPOCH 2</text>
<text x="972" y="367" class="mono bone" font-size="12.5">s&#8322; &#8212; fine-tuned</text>
<text x="972" y="389" class="mono muted" font-size="11.5">&#8230; lineage continues</text>

<!-- gate FALSE -> REFUSED -->
<line x1="470" y1="412" x2="470" y2="446" stroke="#E9883B" stroke-width="1.9" stroke-dasharray="6 5" marker-end="url(#emberarrow)"/>
<text x="486" y="433" class="ember" font-size="12" font-family="DejaVu Sans, sans-serif">&#968; = false &#10007;</text>

<rect x="300" y="448" width="620" height="80" rx="12" fill="#0F1217" stroke="#E9883B" stroke-width="1.75" stroke-dasharray="6 5"/>
<text x="320" y="476" class="serif bone" font-size="15">&#968; = false &#8594; the Ark REFUSES the transformation</text>
<text x="320" y="499" class="mono muted" font-size="12">a real, computed boundary (a reachable halt): same lineage, a NEW epoch begins</text>
<text x="320" y="517" class="mono muted" font-size="11">nothing keeps it valid automatically &#8212; no projection, no conservation, no einselection</text>

<!-- ================= LOWER BAND: psi expanded + MoE ================= -->
<!-- psi, expanded -->
<rect x="64" y="548" width="636" height="132" rx="12" fill="#13161C" stroke="#46586A" stroke-width="1.5"/>
<text x="88" y="578" class="serif bone" font-size="15">&#968;, expanded &#8212; what &#963;_verify checks at the gate</text>
<text x="88" y="601" class="mono slate" font-size="13">&#968; = &#968;_int &#8743; &#968;_beh ( &#8743; &#968;_surf )</text>
<circle cx="96" cy="620" r="4" fill="#E9883B"/>
<text x="110" y="624" class="mono bone" font-size="12">&#968;_int &#8212; checkpoint hash = seal<tspan class="muted">&#160;&#160;(operational)</tspan></text>
<circle cx="96" cy="642" r="4" fill="#E9883B"/>
<text x="110" y="646" class="mono bone" font-size="12">&#968;_beh &#8212; eval battery within threshold &#964;<tspan class="muted">&#160;&#160;(operational)</tspan></text>
<circle cx="96" cy="664" r="4" fill="none" stroke="#E9883B" stroke-width="1.4"/>
<text x="110" y="668" class="mono bone" font-size="12">&#968;_surf &#8212; activations inside a learned region &#183; the QNM bridge<tspan class="ember">&#160;&#160;(speculative)</tspan></text>

<!-- MoE illustrative -->
<rect x="716" y="548" width="500" height="132" rx="12" fill="#0F1217" stroke="#46586A" stroke-width="1.5" stroke-dasharray="6 5"/>
<text x="740" y="578" class="serif bone" font-size="14.5">MoE experts &#8212; ILLUSTRATIVE ONLY</text>
<text x="740" y="599" class="mono muted" font-size="11.5">routing, not sub-epochs &#183; no breakable &#968;</text>
<rect x="740" y="612" width="22" height="22" rx="4" fill="#0F1217" stroke="#46586A" stroke-width="1.3"/>
<rect x="770" y="612" width="22" height="22" rx="4" fill="#F4A862" stroke="#C96A28" stroke-width="1"/>
<rect x="800" y="612" width="22" height="22" rx="4" fill="#0F1217" stroke="#46586A" stroke-width="1.3"/>
<rect x="830" y="612" width="22" height="22" rx="4" fill="#0F1217" stroke="#46586A" stroke-width="1.3"/>
<rect x="860" y="612" width="22" height="22" rx="4" fill="#F4A862" stroke="#C96A28" stroke-width="1"/>
<rect x="890" y="612" width="22" height="22" rx="4" fill="#0F1217" stroke="#46586A" stroke-width="1.3"/>
<text x="928" y="628" class="mono muted" font-size="10.5">active subset</text>
<text x="740" y="658" class="mono muted" font-size="11">~49B active of ~1.6T &#8212; the active set churns token-to-token</text>
<text x="740" y="674" class="mono muted" font-size="10.5">while the superstate &#968; holds &#183; the weakest nesting in the family</text>

<!-- ================= MEMORY ================= -->
<rect x="64" y="700" width="1152" height="86" rx="12" fill="#13161C" stroke="#46586A" stroke-width="1.5"/>
<text x="92" y="730" class="serif bone" font-size="16">MEMORY / RECORD&#160;&#160;M &#8212; append-only transformation lineage</text>
<text x="1188" y="730" text-anchor="end" class="ember" font-size="12">LITERAL</text>
<text x="92" y="754" class="mono muted" font-size="12">[ (s&#8320;, &#963;&#8321;, s&#8321;), (s&#8321;, &#963;&#8322;, s&#8322;), &#8230; ]&#160;&#160;+&#160;&#160;identity proofs: checkpoint hash &#183; eval fingerprint, recorded at every crossing</text>
<text x="92" y="774" class="mono muted" font-size="11">the trajectory a history-dependent &#968; would range over (open: README §6) &#8212; a direction, not a result</text>

<!-- Steward -> Memory query arrow -->
<line x1="640" y1="812" x2="640" y2="788" stroke="#6FA0B2" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="656" y="803" class="mono muted" font-size="11">queries (read-only)</text>

<!-- ================= STEWARD ================= -->
<rect x="400" y="812" width="480" height="92" rx="12" fill="#13161C" stroke="#46586A" stroke-width="1.5"/>
<text x="428" y="846" class="serif bone" font-size="16">THE STEWARD</text>
<text x="556" y="846" class="mono muted" font-size="12">&#8212; read-only auditor (literal)</text>
<text x="428" y="870" class="mono muted" font-size="12.5">&#8713; S&#160;&#160;&#183;&#160;&#160;replays M, re-verifies &#968;&#160;&#160;&#183;&#160;&#160;does not drive &#948;</text>

<!-- ================= FOOTER ================= -->
<line x1="64" y1="926" x2="1216" y2="926" stroke="#46586A" stroke-opacity="0.35" stroke-width="1"/>
<text x="64" y="950" class="mono muted" font-size="12">Legend &#8212; solid border = literal mechanism (Ark &#183; Memory &#183; Steward, the inverse of SOL / MWA where they are fenced correspondences) &#183; dashed = speculative or illustrative (&#968;_surf &#183; MoE)</text>
<text x="64" y="972" class="mono muted" font-size="12">Forward-directed by design; the speculative retrocausal handshake &#948;* is deliberately omitted (README §4).</text>
<text x="64" y="1000" class="mono" font-size="13"><tspan class="muted">How &#968; is held across the family:&#160;&#160;</tspan><tspan class="ember">CHECK (DISCRETE &#183; DEEPSEEK)</tspan><tspan class="muted">&#160;&#8594; CONSERVE (SOL, E&lt;0) &#8594; PROJECT (QNM, P_&#968;) &#8594; SELECT (MWA, einselection)</tspan></text>
<text x="64" y="1022" class="mono muted" font-size="11">&#8212; DEEPSEEK returns the check to a real, openly-documented artifact: the only operational derivation in the set.</text>
<text x="64" y="1050" class="mono muted" font-size="11">Grounding &#8212; DeepSeek-V4-Pro (preview, 24 Apr 2026; MIT open weights; full technical report; batch-invariant deterministic kernels).</text>
<text x="64" y="1068" class="mono muted" font-size="11">&#968;_beh reproducibility is conditional on controlled execution; NIST CAISI (2 May 2026) reproduced scores below DeepSeek's self-reported figures.</text>
</svg>
